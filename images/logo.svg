    <path d="M 32 30 C 33.5 28.5 35.5 28.5 37 30 C 38.5 31.5 38.5 33.5 37 35 L 35 33" stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none" />
  </g>
  
  <g transform="translate(90, 15)">
