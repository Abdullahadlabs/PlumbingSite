<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function() {
      function slugify(text) {
        if (!text) return '';
        let decoded = text;
        try {
          let prev;
          do {
            prev = decoded;
            decoded = decodeURIComponent(decoded);
          } while (decoded !== prev);
        } catch (e) {}
        return decoded
          .toLowerCase()
          .replace(/[^a-z0-9\s-_]/g, '')
          .trim()
          .replace(/[\s_-]+/g, '-')
          .replace(/^-+|-+$/g, '');
      }
      window.slugify = slugify;

      const currentPath = window.location.pathname;
      const currentSearch = window.location.search;
      
      let cleanPath = currentPath;
      let needsRedirect = false;

      const parts = currentPath.split('/');
      const cityIdx = parts.indexOf('city');
      const stateIdx = parts.indexOf('state');

      if (cityIdx !== -1 && cityIdx + 3 < parts.length) {
        const statePart = parts[cityIdx + 1];
        const cityPart = parts[cityIdx + 2];
        const zipPart = parts[cityIdx + 3];
        const cleanState = slugify(statePart);
        const cleanCity = slugify(cityPart);
        const cleanZip = zipPart.replace(/[^0-9]/g, '');

        if (statePart !== cleanState || cityPart !== cleanCity || zipPart !== cleanZip || parts.length > cityIdx + 4 || (parts.length === cityIdx + 4 && currentPath.endsWith('/'))) {
          needsRedirect = true;
          parts[cityIdx + 1] = cleanState;
          parts[cityIdx + 2] = cleanCity;
          parts[cityIdx + 3] = cleanZip;
          cleanPath = parts.slice(0, cityIdx + 4).join('/');
        }
      } else if (stateIdx !== -1 && stateIdx + 1 < parts.length) {
        const statePart = parts[stateIdx + 1];
        const cleanState = slugify(statePart);

        if (statePart !== cleanState || parts.length > stateIdx + 2 || (parts.length === stateIdx + 2 && currentPath.endsWith('/'))) {
          needsRedirect = true;
          parts[stateIdx + 1] = cleanState;
          cleanPath = parts.slice(0, stateIdx + 2).join('/');
        }
      }

      const params = new URLSearchParams(currentSearch);
      let paramsChanged = false;
      ['city', 'state', 'service'].forEach(param => {
        if (params.has(param)) {
          const val = params.get(param);
          const cleanVal = slugify(val);
          if (val !== cleanVal) {
            params.set(param, cleanVal);
            paramsChanged = true;
          }
        }
      });
      if (params.has('zip')) {
        const val = params.get('zip');
        const cleanVal = val.replace(/[^0-9]/g, '');
        if (val !== cleanVal) {
          params.set('zip', cleanVal);
          paramsChanged = true;
        }
      }

      const hasRawSpace = window.location.href.includes(' ') || window.location.href.includes('%20') || window.location.href.includes('%25');
      if (needsRedirect || paramsChanged || hasRawSpace) {
        const newSearch = params.toString() ? '?' + params.toString() : '';
        const cleanUrl = window.location.origin + cleanPath + newSearch;
        window.location.replace(cleanUrl);
        return;
      }

      let canonicalLink = document.querySelector('link[rel="canonical"]');
      if (!canonicalLink) {
        canonicalLink = document.createElement('link');
        canonicalLink.setAttribute('rel', 'canonical');
        document.head.appendChild(canonicalLink);
      }
      const newSearch = params.toString() ? '?' + params.toString() : '';
      canonicalLink.setAttribute('href', `https://homeplumbingusa.com${cleanPath}${newSearch}`);
    })();
  </script>

    })();
